<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sign in — auth2</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f1115; color: #e7e9ee; padding: 24px;
      }
      .card {
        width: 100%; max-width: 420px; background: #181b22; border: 1px solid #262a33;
        border-radius: 16px; padding: 28px 28px 24px; box-shadow: 0 10px 40px rgba(0,0,0,.4);
      }
      .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
      .logo {
        width: 32px; height: 32px; border-radius: 8px; flex: 0 0 32px;
        background: conic-gradient(from 220deg, #4285f4, #ea4335, #fbbc05, #34a853, #4285f4);
      }
      .brand b { font-size: 15px; font-weight: 600; }
      h1 { font-size: 21px; margin: 0 0 6px; font-weight: 500; }
      p.sub { margin: 0 0 6px; color: #9aa1ad; font-size: 14px; }
      .app {
        margin: 18px 0; padding: 13px 14px; border-radius: 10px;
        background: #11141a; border: 1px solid #2d323d; font-size: 13px;
      }
      .app .k { color: #9aa1ad; }
      .app .v { color: #c7cdd8; font-family: ui-monospace, monospace; word-break: break-all; }
      .app .v + .k { display: block; margin-top: 10px; }
      label { display: block; font-size: 12px; color: #9aa1ad; margin: 14px 0 6px; }
      input {
        width: 100%; padding: 11px 12px; border-radius: 9px; border: 1px solid #2d323d;
        background: #11141a; color: #e7e9ee; font-size: 14px;
      }
      .actions { display: flex; gap: 10px; margin-top: 22px; }
      button {
        flex: 1; padding: 12px; border: 0; border-radius: 10px;
        font-size: 15px; font-weight: 600; cursor: pointer;
      }
      button.primary { background: #3b82f6; color: #fff; }
      button.ghost { background: transparent; color: #9aa1ad; border: 1px solid #2d323d; }
      button:active { transform: translateY(1px); }
      .scopes { margin: 4px 0 0; padding-left: 18px; color: #9aa1ad; font-size: 13px; }
      .note {
        margin-top: 20px; font-size: 12px; color: #6b7280; word-break: break-all;
      }
      .note code { font-family: ui-monospace, monospace; color: #8a93a3; }
      .status:empty { display: none; }
      .status {
        margin-top: 16px; padding: 12px; border-radius: 9px; font-size: 13px;
        background: #11141a; border: 1px solid #2d323d; word-break: break-all;
      }
      .status a { color: #60a5fa; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand"><span class="logo"></span><b id="provider">auth2 Accounts</b></div>

      <h1>Sign in</h1>
      <p class="sub">to continue to <b id="appName">Teleop Tablet</b></p>

      <div class="app">
        <span class="k">App is requesting to redirect to</span>
        <span class="v" id="redirectShow"></span>
        <span class="k">Permissions</span>
        <ul class="scopes" id="scopeList"></ul>
      </div>

      <label for="account">Account</label>
      <input id="account" value="operator@earthbrain.test" spellcheck="false"
             autocapitalize="off" autocorrect="off" />

      <div class="actions">
        <button class="ghost" id="cancel">Cancel</button>
        <button class="primary" id="signin">Sign in</button>
      </div>

      <p class="note">Will redirect to <code id="finalNote"></code></p>
      <div class="status" id="status"></div>
    </div>

    <script>
      // This page plays the role of an OAuth authorization endpoint, e.g.:
      //   https://<domain>/?redirect_uri=com.earthbrain.teleop.tablet://callback&state=xyz&scope=openid%20email&client_id=teleop-tablet
      // After the user signs in, it redirects back to redirect_uri with ?code=&state=
      // exactly like Google/Microsoft do. The redirect_uri here uses a reverse-DNS
      // custom scheme (AppAuth/Google convention) instead of a short scheme.
      const params = new URLSearchParams(location.search);

      // Accept the standard OAuth param names; fall back to defaults that mirror a
      // real OIDC authorize request, e.g.:
      //   <domain>/connect/authorize?response_type=code&client_id=ee47388b-a891-4772-83c0-b21d59c48cb4&redirect_uri=com.earthbrain.teleop.tablet://callback&scope=abcde
      const redirectUri = params.get('redirect_uri') || params.get('redirect') ||
        'com.earthbrain.teleop.tablet://callback';
      const clientId    = params.get('client_id') || 'ee47388b-a891-4772-83c0-b21d59c48cb4';
      const scope       = params.get('scope') || 'abcde';
      const responseType = params.get('response_type') || 'code';
      // state is round-tripped untouched (CSRF protection); generate one if absent.
      const state       = params.get('state') || randomString(16);

      function randomString(n) {
        const a = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let s = '';
        for (let i = 0; i < n; i++) s += a[Math.floor(Math.random() * a.length)];
        return s;
      }

      // Two-hop flow: a fresh visit (no oauth params) is the "start" screen — Sign in
      // navigates to the authorize URL on THIS domain. The authorize page (params
      // present) then redirects to redirect_uri with the code. Mirrors a real app.
      const isAuthorize = params.has('client_id') || params.has('redirect_uri');

      function buildAuthorizeUrl() {
        const q = new URLSearchParams({
          response_type: responseType,
          client_id: clientId,
          redirect_uri: redirectUri,
          scope: scope,
          state: state,
        });
        return location.origin + '/connect/authorize?' + q.toString();
      }

      function buildCallback() {
        const code = 'test_' + randomString(20);
        const sep = redirectUri.includes('?') ? '&' : '?';
        return redirectUri + sep + 'code=' + encodeURIComponent(code) +
               '&state=' + encodeURIComponent(state);
      }

      // Show the requesting redirect target + scopes, like a real consent screen.
      document.getElementById('redirectShow').textContent = redirectUri;
      document.getElementById('appName').textContent = clientId;
      const scopeList = document.getElementById('scopeList');
      scope.split(/[\s,]+/).filter(Boolean).forEach((s) => {
        const li = document.createElement('li');
        li.textContent = s;
        scopeList.appendChild(li);
      });
      // Preview line: on the start screen show the authorize URL we'll open; on the
      // authorize screen show the callback we'll redirect to.
      document.getElementById('finalNote').textContent = isAuthorize
        ? redirectUri + (redirectUri.includes('?') ? '&' : '?') + 'code=…&state=' + state
        : buildAuthorizeUrl();

      document.getElementById('signin').addEventListener('click', () => {
        const url = isAuthorize ? buildCallback() : buildAuthorizeUrl();
        document.getElementById('status').innerHTML =
          (isAuthorize ? 'Redirecting to:' : 'Opening authorize endpoint:') +
          '<br><code>' + url + '</code><br><br>' +
          'If it doesn’t open automatically, tap <a href="' + url + '">here</a>.';
        window.location.href = url;
      });

      document.getElementById('cancel').addEventListener('click', () => {
        const sep = redirectUri.includes('?') ? '&' : '?';
        window.location.href = redirectUri + sep + 'error=access_denied&state=' +
          encodeURIComponent(state);
      });
    </script>
  </body>
</html>
